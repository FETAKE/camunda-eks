spring.application.name=cos

server.port=8081


# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:kycdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# Email Configuration

spring.mail.username=umxsharma@gmail.com
spring.mail.password=aulnzejegwakztuc
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.timeout=3000

# Logging Configuration
logging.level.com.cvs.cos=INFO
logging.level.io.camunda=INFO
logging.level.org.springframework.mail=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Allow bean overriding
spring.main.allow-bean-definition-overriding=true


# Document Upload Configuration
app.document.upload.base-url=http://localhost:8081
app.document.upload.directory=uploads/documents/
app.document.upload.max-file-size=5MB
app.document.upload.allowed-types=pdf,jpg,jpeg,png
# File upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
spring.servlet.multipart.enabled=true


# Zeebe / Camunda client stability fixes
camunda.client.request-timeout=30s
camunda.client.job.polling.timeout=20s
camunda.client.grpc.keepalive-time=30s
camunda.client.grpc.keepalive-timeout=10s
camunda.client.grpc.keepalive-without-calls=true
camunda.client.grpc.max-inbound-message-size=10MB





